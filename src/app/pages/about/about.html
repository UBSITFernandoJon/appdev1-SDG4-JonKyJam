<section class="py-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold text-success">🎯 About SDG 4</h1>
    <h4 class="text-muted">Quality Education</h4>
    <p class="lead mt-3">
      SDG 4 ensures inclusive and equitable quality education
      and promotes lifelong learning opportunities for all.
    </p>
  </div>

  <!-- SDG Facts -->
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h5 class="fw-bold text-success mb-3">📊 Key Facts</h5>
      <ul class="list-group">
        <li
          class="list-group-item"
          *ngFor="let fact of sdgFacts">
          📌 {{ fact }}
        </li>
      </ul>
    </div>
  </div>

  <!-- Footer note with pipe -->
  <div class="text-center mt-5 text-muted small">
    <p>EduTrack © {{ currentYear | date:'yyyy' }} — University of Baguio</p>
    <p>{{ 'committed to quality education' | uppercase }}</p>
  </div>

</section>
