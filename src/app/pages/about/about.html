<section class="py-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold text-success">PROJECT: JONKYJAM</h1>
    <h4 class="text-muted">SDG 4: Quality Education</h4>
    <p class="lead mt-3">
      The Project JonKyJam will provide you the one of the best 
    </p>
  </div>

 
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h5 class="fw-bold text-success mb-3">Mission:</h5>
      <ul class="list-group">
        <li
          class="list-group-item"
          *ngFor="let fact of Mission">
          {{ fact }}
        </li>
      </ul>
    </div>
  </div>

   
   <div class="row justify-content-center">
    <div class="col-md-8">
      <h5 class="fw-bold text-success mb-3">Vision:</h5>
      <ul class="list-group">
        <li
          class="list-group-item"
          *ngFor="let fact of Vision">
          {{ fact }}
        </li>
      </ul>
    </div>
  </div>

  <!-- Footer note with pipe -->
  <div class="text-center mt-5 text-muted small">
    <p>EduTrack © {{ currentYear | date:'yyyy' }} — University of Baguio</p>
    <p>{{ 'committed to quality education' | uppercase }}</p>
  </div>

</section>
